<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hora Cero | Relojería de Selección</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root {
            --primario: #0f0f0f;
            --secundario: #d4af37;
            --acento: #e6e6e6;
            --blanco: #ffffff;
            --whatsapp: #25d366;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            background-color: #fdfdfd;
            color: var(--primario);
            line-height: 1.6;
            overflow-x: hidden;
        }

        header {
            background-color: var(--primario);
            color: var(--blanco);
            padding: 2rem 0;
            text-align: center;
            border-bottom: 3px solid var(--secundario);
        }

        .logo h1 {
            margin: 0;
            letter-spacing: 8px;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 2.2rem;
        }

        .hero {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1523170335258-f5ed11844a49?auto=format&fit=crop&q=80&w=1000');
            background-size: cover;
            background-position: center;
            color: var(--blanco);
            padding: 100px 20px;
            text-align: center;
        }

        .container {
            max-width: 1200px;
            margin: -50px auto 40px;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        .productos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }

        .producto-card {
            background: var(--blanco);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            transition: 0.4s;
        }

        .producto-card:hover {
            transform: translateY(-10px);
        }

        .img-container {
            width: 100%;
            height: 350px;
            background-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-bottom: 1px solid #f0f0f0;
        }

        .producto-card img, .producto-card video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 15px;
            transition: transform 0.6s ease;
        }

        .producto-card:hover img, .producto-card:hover video {
            transform: scale(1.05);
        }

        .info {
            padding: 25px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .info h3 {
            margin: 0 0 15px;
            font-size: 1.2rem;
            color: var(--primario);
            text-transform: uppercase;
            border-bottom: 2px solid var(--secundario);
            display: inline-block;
            width: fit-content;
        }

        .descripcion-profunda {
            font-size: 0.9rem;
            color: #444;
            margin-bottom: 20px;
            text-align: justify;
        }
